services:
  l1-identity-context:
    build: .
    container_name: apollo-l1-identity
    env_file: .env
    ports:
      - "8001:8001"
    environment:
      - L1_JWT_PRIVATE_KEY_PATH=/app/app/keys/knk_private.pem
      - L1_JWT_PUBLIC_KEY_PATH=/app/app/keys/knk.pem
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8001
      --reload
      --log-level debug
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: apollo-l1-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

volumes:
  redis-data:
